<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单确认 - CEP 系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f9fafb;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .batch-info {
            background: #f8f9fa;
            border-left: 4px solid #2563eb;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .batch-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .batch-info strong {
            color: #333;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Price type selector */
        .price-type-bar {
            background: #f0f4ff;
            border: 1px solid #dbe4ff;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .price-type-bar label.bar-title {
            font-weight: 600;
            color: #1e40af;
            font-size: 14px;
            white-space: nowrap;
        }

        .price-type-options {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .price-type-options input[type="radio"] {
            display: none;
        }

        .price-type-options label {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid #dbe4ff;
            color: #1e40af;
            background: white;
            transition: all 0.15s;
        }

        .price-type-options input[type="radio"]:checked+label {
            background: #2563eb;
            color: white;
            border-color: transparent;
        }

        .price-type-options label:hover {
            border-color: #93a8f5;
        }

        .algo-hint {
            font-size: 12px;
            color: #6b7280;
            margin-left: auto;
            font-style: italic;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        thead {
            background: #1f2937;
            color: white;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            font-weight: 600;
            font-size: 13px;
        }

        td {
            font-size: 14px;
            color: #555;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        /* Live price */
        .live-price {
            font-family: "SF Mono", "Fira Code", monospace;
            font-weight: 700;
            font-size: 15px;
            color: #059669;
            transition: color 0.3s;
        }

        .live-price.flash {
            color: #dc2626;
        }

        .bid-ask {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .bid-ask .bid {
            color: #dc2626;
        }

        .bid-ask .ask {
            color: #059669;
        }

        .theoretical-qty {
            font-family: "SF Mono", monospace;
            font-weight: 600;
            font-size: 14px;
        }

        /* Status badges */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }

        .status-cancelled {
            background: #e2e3e5;
            color: #383d41;
        }

        .editable-input {
            width: 80px;
            padding: 6px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }

        .editable-input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .fractional-info {
            font-size: 12px;
            color: #999;
        }

        /* Batch list styles */
        .batch-row {
            cursor: pointer;
            transition: background 0.15s;
        }

        .batch-row:hover {
            background: #eef2ff !important;
        }

        .batch-id-cell {
            font-family: "SF Mono", monospace;
            font-size: 12px;
            color: #6b7280;
        }

        .amount-cell {
            font-weight: 600;
            color: #1f2937;
        }
    </style>
</head>

<body>
    <!-- Navigation Tabs -->
    <div style="background: white; border-bottom: 2px solid #e5e7eb; margin-bottom: 20px;">
        <div style="max-width: 1400px; margin: 0 auto; display: flex; gap: 0;">
            <a href="/"
                style="padding: 12px 24px; font-size: 14px; font-weight: 500; color: #6b7280; text-decoration: none; transition: all 0.2s;"
                onmouseover="this.style.color='#111827'; this.style.background='#f9fafb';"
                onmouseout="this.style.color='#6b7280'; this.style.background='transparent';">
                全天候配置系统
            </a>
            <a href="/fund-inflow.html"
                style="padding: 12px 24px; font-size: 14px; font-weight: 500; color: #6b7280; text-decoration: none; transition: all 0.2s;"
                onmouseover="this.style.color='#111827'; this.style.background='#f9fafb';"
                onmouseout="this.style.color='#6b7280'; this.style.background='transparent';">
                净入金录入
            </a>
            <a href="/order-confirm.html"
                style="padding: 12px 24px; font-size: 14px; font-weight: 500; color: #2563eb; text-decoration: none; border-bottom: 2px solid #2563eb; margin-bottom: -2px; background: #f9fafb;">
                订单确认
            </a>
            <a href="/order-list.html"
                style="padding: 12px 24px; font-size: 14px; font-weight: 500; color: #6b7280; text-decoration: none; transition: all 0.2s;"
                onmouseover="this.style.color='#111827'; this.style.background='#f9fafb';"
                onmouseout="this.style.color='#6b7280'; this.style.background='transparent';">
                订单列表
            </a>
            <a href="/health.html"
                style="padding: 12px 24px; font-size: 14px; font-weight: 500; color: #6b7280; text-decoration: none; transition: all 0.2s;"
                onmouseover="this.style.color='#111827'; this.style.background='#f9fafb';"
                onmouseout="this.style.color='#6b7280'; this.style.background='transparent';">
                行情健康检查
            </a>
        </div>
    </div>

    <div class="container">
        <!-- ===== View 1: Batch List (no batch_id) ===== -->
        <div id="batchListView" style="display: none;">
            <h1>订单确认</h1>
            <p style="color: #6b7280; margin-bottom: 24px;">选择一个批次查看详情并确认执行</p>

            <div id="batchLoading" class="loading">正在加载批次列表...</div>
            <div id="batchEmptyState" style="display: none; text-align: center; padding: 40px; color: #6b7280;">
                <p style="font-size: 48px; margin-bottom: 16px;"></p>
                <p>暂无净入金记录。</p>
                <a href="/fund-inflow.html"
                    style="color: #2563eb; margin-top: 12px; display: inline-block;">→ 去录入净入金</a>
            </div>
            <table id="batchTable" style="display: none;">
                <thead>
                    <tr>
                        <th>批次ID</th>
                        <th>产品</th>
                        <th>净入金（元）</th>
                        <th>杠杆后金额</th>
                        <th>录入人</th>
                        <th>录入时间</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="batchTableBody"></tbody>
            </table>
        </div>

        <!-- ===== View 2: Batch Detail (with batch_id) ===== -->
        <div id="detailView" style="display: none;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
                <a href="/order-confirm.html"
                    style="color: #2563eb; text-decoration: none; font-size: 14px;">← 返回批次列表</a>
            </div>
            <h1>订单确认</h1>

            <div id="alertBox" class="alert"></div>

            <div id="detailLoading" class="loading">
                <p>正在加载订单数据...</p>
            </div>

            <div id="contentBox" style="display: none;">
                <div class="batch-info">
                    <p><strong>批次ID:</strong> <span id="batchId">-</span></p>
                    <p><strong>产品名称:</strong> <span id="productName">-</span></p>
                    <p><strong>净入金:</strong> <span id="netInflow">-</span> 元</p>
                    <p><strong>杠杆倍数:</strong> <span id="leverageRatio">-</span></p>
                    <p><strong>杠杆后金额:</strong> <span id="leveragedAmount">-</span> 元</p>
                    <p><strong>录入人:</strong> <span id="inputBy">-</span></p>
                    <p><strong>录入时间:</strong> <span id="inputAt">-</span></p>
                </div>

                <!-- Price Type Selector -->
                <div class="price-type-bar" id="priceTypeBar">
                    <label class="bar-title">下单方式：</label>
                    <div class="price-type-options">
                        <input type="radio" name="priceType" id="pt_limit" value="limit" checked>
                        <label for="pt_limit">限价</label>
                        <input type="radio" name="priceType" id="pt_market" value="market">
                        <label for="pt_market">市价</label>
                        <input type="radio" name="priceType" id="pt_best" value="best">
                        <label for="pt_best">最优价</label>
                        <input type="radio" name="priceType" id="pt_twap" value="twap">
                        <label for="pt_twap">TWAP</label>
                        <input type="radio" name="priceType" id="pt_vwap" value="vwap">
                        <label for="pt_vwap">VWAP</label>
                    </div>
                    <span class="algo-hint" id="algoHint"></span>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>合约代码</th>
                            <th>目标市值（元）</th>
                            <th>实时价格</th>
                            <th>合约乘数</th>
                            <th>理论手数</th>
                            <th>四舍五入</th>
                            <th>留白</th>
                            <th>最终手数</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>

                <div class="btn-group" id="actionButtons">
                    <button class="btn btn-primary" id="confirmBtn">确认并执行订单</button>
                    <button class="btn btn-secondary" id="cancelBtn">取消</button>
                </div>
            </div>

            <a href="/fund-inflow.html" class="back-link">← 返回净入金录入</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const batchId = urlParams.get('batch_id');
        let orders = [];
        let priceTimer = null;
        let batchData = null;  // stores the full batch info for recalculation

        // ==================== 路由 ====================
        if (batchId) {
            document.getElementById('detailView').style.display = 'block';
            loadOrderDetail();
        } else {
            document.getElementById('batchListView').style.display = 'block';
            loadBatchList();
        }

        // ==================== View 1: 批次列表 ====================

        async function loadBatchList() {
            try {
                const response = await fetch(`${API_BASE}/fund/inflows`);
                const data = await response.json();

                document.getElementById('batchLoading').style.display = 'none';

                if (!data.success || data.inflows.length === 0) {
                    document.getElementById('batchEmptyState').style.display = 'block';
                    return;
                }

                const tbody = document.getElementById('batchTableBody');
                tbody.innerHTML = '';
                document.getElementById('batchTable').style.display = 'table';

                data.inflows.forEach(inf => {
                    const row = document.createElement('tr');
                    row.className = 'batch-row';
                    row.onclick = () => {
                        window.location.href = `/order-confirm.html?batch_id=${inf.batch_id}`;
                    };

                    let statusBadge;
                    switch (inf.status) {
                        case 'pending':
                            statusBadge = '<span class="status-badge status-pending">待确认</span>';
                            break;
                        case 'confirmed':
                            statusBadge = '<span class="status-badge status-confirmed">已确认</span>';
                            break;
                        case 'cancelled':
                            statusBadge = '<span class="status-badge status-cancelled">已取消</span>';
                            break;
                        default:
                            statusBadge = `<span class="status-badge">${inf.status}</span>`;
                    }

                    const inputAt = inf.input_at ? new Date(inf.input_at).toLocaleString('zh-CN') : '—';
                    const netInflow = parseFloat(inf.net_inflow).toLocaleString('zh-CN', { minimumFractionDigits: 2 });
                    const leveraged = parseFloat(inf.leveraged_amount).toLocaleString('zh-CN', { minimumFractionDigits: 2 });

                    row.innerHTML = `
                        <td class="batch-id-cell">${inf.batch_id.substring(0, 8)}...</td>
                        <td><strong>${inf.product_name}</strong></td>
                        <td class="amount-cell">${netInflow}</td>
                        <td class="amount-cell">${leveraged}</td>
                        <td>${inf.input_by || '—'}</td>
                        <td><small>${inputAt}</small></td>
                        <td>${statusBadge}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                document.getElementById('batchLoading').textContent = '加载失败: ' + error.message;
            }
        }

        // ==================== View 2: 批次详情 ====================

        async function loadOrderDetail() {
            try {
                const response = await fetch(`${API_BASE}/orders/pending?batch_id=${batchId}`);
                const data = await response.json();

                if (data.success) {
                    orders = data.orders;
                    batchData = data;
                    displayOrders(data);
                    document.getElementById('detailLoading').style.display = 'none';
                    document.getElementById('contentBox').style.display = 'block';

                    // 如果已确认，隐藏操作按钮和价格类型选择器
                    if (data.status === 'confirmed') {
                        document.getElementById('actionButtons').style.display = 'none';
                        document.getElementById('priceTypeBar').style.display = 'none';
                    } else {
                        // 开始实时价格轮询
                        startPricePolling();
                    }
                } else {
                    showAlert('加载订单失败: ' + data.message, 'error');
                    document.getElementById('detailLoading').style.display = 'none';
                }
            } catch (error) {
                showAlert('网络错误: ' + error.message, 'error');
                document.getElementById('detailLoading').style.display = 'none';
            }
        }

        function displayOrders(data) {
            document.getElementById('batchId').textContent = data.batch_id;
            document.getElementById('productName').textContent = data.product_name;
            document.getElementById('netInflow').textContent = parseFloat(data.net_inflow).toLocaleString('zh-CN', { minimumFractionDigits: 2 });
            document.getElementById('leverageRatio').textContent = data.leverage_ratio;
            document.getElementById('leveragedAmount').textContent = parseFloat(data.leveraged_amount).toLocaleString('zh-CN', { minimumFractionDigits: 2 });
            document.getElementById('inputBy').textContent = data.input_by || '-';
            document.getElementById('inputAt').textContent = data.input_at || '-';

            renderOrderTable();
        }

        function renderOrderTable() {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';

            orders.forEach((order, index) => {
                const row = document.createElement('tr');
                const price = parseFloat(order.price);
                const tmv = parseFloat(order.target_market_value);
                const multiplier = parseInt(order.contract_multiplier);
                const theoreticalQty = tmv / (price * multiplier);
                const roundedQty = Math.round(theoreticalQty);
                const fractionalPart = theoreticalQty - roundedQty;

                row.innerHTML = `
                    <td><strong>${order.asset_code}</strong></td>
                    <td>${tmv.toLocaleString('zh-CN', { minimumFractionDigits: 2 })}</td>
                    <td>
                        <div class="live-price" id="price_${order.asset_code}">${price.toFixed(2)}</div>
                        <div class="bid-ask" id="bidask_${order.asset_code}"></div>
                    </td>
                    <td>${multiplier}</td>
                    <td class="theoretical-qty" id="theory_${order.asset_code}">${theoreticalQty.toFixed(6)}</td>
                    <td id="rounded_${order.asset_code}">${roundedQty}</td>
                    <td class="fractional-info" id="frac_${order.asset_code}">
                        ${fractionalPart.toFixed(6)}<br>
                        <small>(上次: ${parseFloat(order.previous_fractional).toFixed(6)})</small>
                    </td>
                    <td>
                        <input type="number"
                               class="editable-input"
                               value="${order.final_quantity}"
                               min="0"
                               step="1"
                               data-index="${index}">
                    </td>
                `;
                tbody.appendChild(row);
            });

            // 监听手数修改
            document.querySelectorAll('.editable-input').forEach(input => {
                input.addEventListener('change', function () {
                    const index = parseInt(this.dataset.index);
                    const newQuantity = parseInt(this.value) || 0;
                    orders[index].final_quantity = newQuantity;
                });
            });
        }

        // ==================== 实时价格轮询 ====================

        function startPricePolling() {
            fetchPrices();  // 立即执行一次
            priceTimer = setInterval(fetchPrices, 1000);  // 每秒
        }

        async function fetchPrices() {
            const symbols = orders.map(o => o.asset_code).join(',');
            if (!symbols) return;

            try {
                const response = await fetch(`${API_BASE}/prices/realtime?symbols=${symbols}`);
                const data = await response.json();
                if (!data.success) return;

                orders.forEach((order, index) => {
                    const priceData = data.prices[order.asset_code];
                    if (!priceData) return;

                    const newPrice = priceData.last_price;
                    const oldPrice = parseFloat(order.price);

                    // 更新价格显示
                    const priceEl = document.getElementById(`price_${order.asset_code}`);
                    if (priceEl) {
                        priceEl.textContent = newPrice.toFixed(2);
                        // 涨跌闪烁
                        if (newPrice > oldPrice) {
                            priceEl.style.color = '#059669';  // 绿
                        } else if (newPrice < oldPrice) {
                            priceEl.style.color = '#dc2626';  // 红
                        }
                    }

                    // 更新买1/卖1
                    const bidAskEl = document.getElementById(`bidask_${order.asset_code}`);
                    if (bidAskEl) {
                        const bid = priceData.bid1 > 0 ? priceData.bid1.toFixed(2) : '—';
                        const ask = priceData.ask1 > 0 ? priceData.ask1.toFixed(2) : '—';
                        bidAskEl.innerHTML = `<span class="bid">买1: ${bid}</span> / <span class="ask">卖1: ${ask}</span>`;
                    }

                    // 用新价格重算理论手数
                    order.price = newPrice;  // 更新内存中的价格
                    const tmv = parseFloat(order.target_market_value);
                    const multiplier = parseInt(order.contract_multiplier);
                    const theoreticalQty = tmv / (newPrice * multiplier);
                    const roundedQty = Math.round(theoreticalQty);
                    const fractionalPart = theoreticalQty - roundedQty;

                    const theoryEl = document.getElementById(`theory_${order.asset_code}`);
                    if (theoryEl) theoryEl.textContent = theoreticalQty.toFixed(6);

                    const roundedEl = document.getElementById(`rounded_${order.asset_code}`);
                    if (roundedEl) roundedEl.textContent = roundedQty;

                    const fracEl = document.getElementById(`frac_${order.asset_code}`);
                    if (fracEl) {
                        fracEl.innerHTML = `${fractionalPart.toFixed(6)}<br><small>(上次: ${parseFloat(order.previous_fractional).toFixed(6)})</small>`;
                    }
                });
            } catch (e) {
                // 静默失败，不打断用户
            }
        }

        // ==================== 价格类型选择器 ====================

        document.querySelectorAll('input[name="priceType"]').forEach(radio => {
            radio.addEventListener('change', function () {
                const hint = document.getElementById('algoHint');
                if (this.value === 'twap') {
                    hint.textContent = 'TWAP: 30分钟内按时间均匀拆单执行';
                } else if (this.value === 'vwap') {
                    hint.textContent = 'VWAP: 30分钟内按成交量分布拆单执行';
                } else if (this.value === 'market') {
                    hint.textContent = '市价: 以当前对手价立即成交';
                } else if (this.value === 'best') {
                    hint.textContent = '最优价: 以最优对手价挂单';
                } else {
                    hint.textContent = '限价: 以当前最新价挂单';
                }
            });
        });

        function getSelectedPriceType() {
            const checked = document.querySelector('input[name="priceType"]:checked');
            return checked ? checked.value : 'limit';
        }

        // ==================== 确认并执行订单 ====================

        document.getElementById('confirmBtn').addEventListener('click', async function () {
            const confirmBtn = this;
            const priceType = getSelectedPriceType();
            const priceTypeLabels = { limit: '限价', market: '市价', best: '最优价', twap: 'TWAP', vwap: 'VWAP' };

            if (!confirm(`确定以「${priceTypeLabels[priceType]}」方式执行所有订单？`)) return;

            confirmBtn.disabled = true;
            confirmBtn.textContent = '正在执行...';

            // 停止价格轮询
            if (priceTimer) {
                clearInterval(priceTimer);
                priceTimer = null;
            }

            try {
                // 先更新订单数量
                for (const order of orders) {
                    await fetch(`${API_BASE}/orders/update`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            order_id: order.id,
                            final_quantity: order.final_quantity
                        })
                    });
                }

                // 确认并执行（带上 price_type）
                const response = await fetch(`${API_BASE}/orders/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        batch_id: batchId,
                        confirmed_by: '交易员',
                        price_type: priceType
                    })
                });

                const data = await response.json();

                if (data.success) {
                    const failedCount = (data.failed_orders || []).length;
                    const executedCount = (data.executed_orders || []).length;

                    if (failedCount > 0) {
                        const failDetails = data.failed_orders.map(f => `${f.asset_code}: ${f.error}`).join('\n');
                        showAlert(`部分订单失败 (成功${executedCount}笔，失败${failedCount}笔):\n${failDetails}`, 'error');
                        confirmBtn.disabled = false;
                        confirmBtn.textContent = '确认并执行订单';
                        startPricePolling();  // 恢复轮询
                    } else {
                        showAlert(`订单执行成功！共执行 ${executedCount} 笔（${priceTypeLabels[priceType]}）`, 'success');
                        document.getElementById('actionButtons').style.display = 'none';
                        document.getElementById('priceTypeBar').style.display = 'none';
                    }
                } else {
                    showAlert('订单执行失败: ' + data.message, 'error');
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = '确认并执行订单';
                    startPricePolling();
                }
            } catch (error) {
                showAlert('网络错误: ' + error.message, 'error');
                confirmBtn.disabled = false;
                confirmBtn.textContent = '确认并执行订单';
                startPricePolling();
            }
        });

        // 取消按钮
        document.getElementById('cancelBtn').addEventListener('click', function () {
            if (confirm('确定要取消吗？')) {
                if (priceTimer) clearInterval(priceTimer);
                window.location.href = '/order-confirm.html';
            }
        });

        // 显示提示信息
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';
            if (type === 'success') {
                setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
            }
        }

        // 页面离开时清理
        window.addEventListener('beforeunload', () => {
            if (priceTimer) clearInterval(priceTimer);
        });
    </script>
</body>

</html>
